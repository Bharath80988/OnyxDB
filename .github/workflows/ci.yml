name: OnyxDB CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: onyxdb-dashboard/package-lock.json
        
    - name: Install Frontend Dependencies
      run: |
        cd onyxdb-dashboard
        npm ci
        
    - name: Run Maven Tests
      run: mvn test

    - name: Verify Docker Build
      run: docker build -t onyxdb:latest .
