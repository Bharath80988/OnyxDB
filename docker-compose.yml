version: '3.8'

services:
  onyxdb:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_STORAGE_PATH=/data/onyxdb
      - REDIS_URL=redis://redis:6379
    volumes:
      - onyxdb_data:/data/onyxdb
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery-worker:
    # Assuming we will build a python image in sdks/python/worker
    # For now, this is a placeholder for the Python Celery worker
    image: python:3.11-alpine
    command: >
      sh -c "pip install celery redis && celery -A worker worker --loglevel=info"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis

volumes:
  onyxdb_data:
  redis_data:
